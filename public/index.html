const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };

let myCid=localStorage.getItem("oo_cid");

/* ===== 읽어주기 (Web Speech) ===== */
let VOICES=[];
function loadVoices(){ try{ VOICES=speechSynthesis.getVoices()||[]; }catch(e){ VOICES=[]; } }
if("speechSynthesis" in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
const EN_VOICE={"Australian":"en-AU","Southern US":"en-US","Scottish":"en-GB","Cockney (London)":"en-GB","Irish":"en-IE"};
function ttsLang(region){ return lang==="ko" ? "ko-KR" : (EN_VOICE[region]||"en-GB"); }
function pickVoice(code){ if(!VOICES.length) return null;
  return VOICES.find(v=>v.lang.toLowerCase()===code.toLowerCase()) || VOICES.find(v=>v.lang.toLowerCase().startsWith(code.slice(0,2))) || null; }
function speak(text, region){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=ttsLang(region); const v=pickVoice(u.lang); if(v) u.voice=v; u.rate=0.92;
  const btn=$("q-speak"); btn.classList.add("playing");
  u.onend=u.onerror=()=>btn.classList.remove("playing");
  speechSynthesis.speak(u);
}

/* ===== 글로벌 리더보드 (Workers KV) ===== */
const LB_API="/api/lb";
function esc(s){ return String(s).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c])); }
async function fetchLB(){ try{ const r=await fetch(LB_API+"?lang="+lang,{cache:"no-store"}); if(!r.ok) throw 0; return await r.json(); }catch(e){ return null; } }
async function submitScore(name){
  try{ const r=await fetch(LB_API,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({lang, name, cid:myCid, score:game.score, streak:game.maxStreak})});
    if(!r.ok) throw 0; return await r.json(); }catch(e){ return null; }
}
function renderLB(wrapId, data){
  const t=T[lang], w=$(wrapId); if(!w) return;
  if(data===null){ w.innerHTML=`<h3>🌐 ${t.globalHof}</h3><div class="lbload">${t.lbErr}</div>`; return; }
  const list=(data.top||[]);
  if(!list.length){ w.innerHTML=`<h3>🌐 ${t.globalHof}</h3><div class="lbload">${t.lbEmpty}</div>`; return; }
  const li=list.slice(0,10).map((r,i)=>`<li class="${medalClass(i)} ${r.cid===myCid?'me':''}"><span class="nm">${esc(r.name)}</span><span class="sc">${r.score}/${DRAW} · 🔥${r.streak}</span></li>`).join("");
  w.innerHTML=`<h3>🌐 ${t.globalHof}</h3><ol>${li}</ol>`;
}
async function loadStartLB(){ const w=$("s-lbWrap"); if(!w) return;
  w.innerHTML=`<h3>🌐 ${T[lang].globalHof}</h3><div class="lbload">${T[lang].lbLoading}</div>`;
  renderLB("s-lbWrap", await fetchLB()); }
async function doSubmit(){
  const t=T[lang]; let name=($("r-name").value||"").trim().slice(0,12);
  if(!name) name = lang==="ko"?"익명":"Anon";
  localStorage.setItem("oo_name",name);
  $("r-submit").disabled=true; $("r-msg").textContent="…";
  const res=await submitScore(name);
  if(res){ $("r-msg").textContent=t.submitted+(res.rank?` · ${t.myRank(res.rank)}`:""); renderLB("r-lbWrap", res); }
  else { $("r-msg").textContent=t.lbErr; $("r-submit").disabled=false; }
}
async function setupResultLB(){
  $("r-name").value=localStorage.getItem("oo_name")||"";
  $("r-msg").textContent=""; $("r-submit").disabled=false;
  $("r-lbWrap").innerHTML=`<h3>🌐 ${T[lang].globalHof}</h3><div class="lbload">${T[lang].lbLoading}</div>`;
  if(localStorage.getItem("oo_name")) doSubmit();
  else renderLB("r-lbWrap", await fetchLB());
}

  $("q-hintBtn").textContent=t.hintBtn;
  $("r-cardScore").textContent="🖼️ "+t.cardScore;
  $("r-cardHof").textContent="🏆 "+t.cardHof;
  $("r-share").textContent="🔗 "+t.share;
  $("r-retry").textContent=t.retry;
  $("r-home").textContent=t.home;
  $("r-toplbl").textContent=t.toplbl;
  $("r-namelbl").textContent=t.nameLbl;
  $("r-name").placeholder=t.namePh;
  $("r-submit").textContent=t.submitBtn;
  renderHOF("s-hofWrap");
  loadStartLB();
}

/* ===== 명예의 전당 (score + maxStreak) ===== */
function hofKey(){ return "oo_dialect_hof2_"+lang; }
function getHOF(){ try{ return JSON.parse(localStorage.getItem(hofKey())||"[]"); }catch(e){ return []; } }
function bestStats(){ const h=getHOF(); return h.length? h[0] : null; }
function pushHOF(score, streak){
  const h=getHOF();
  h.push({s:score, k:streak, d:new Date().toISOString().slice(0,10)});
  h.sort((a,b)=> b.s-a.s || b.k-a.k || (a.d<b.d?-1:1));
  localStorage.setItem(hofKey(), JSON.stringify(h.slice(0,5)));
}
function medalClass(i){ return i===0?"gold":i===1?"silver":i===2?"bronze":""; }
function renderHOF(wrapId){
  const t=T[lang], h=getHOF(), w=$(wrapId);
  if(!h.length){ w.innerHTML=`<h3>${t.hof}</h3><div style="color:var(--sub);font-size:14px;padding:4px 2px;">${t.nohof}</div>`; return; }
  const li=h.map((r,i)=>`<li class="${medalClass(i)}"><span class="nm">${t.you} · ${r.d}</span><span class="sc">${r.s}/${DRAW} · 🔥${r.k}</span></li>`).join("");
  w.innerHTML=`<h3>${t.hof}</h3><ol>${li}</ol>`;
}

/* ===== 퀴즈 ===== */
function startQuiz(){
  const data=POOL[lang];
  const picks=shuffle([...data.q]).slice(0,DRAW);
  game={items:picks, i:0, score:0, streak:0, maxStreak:0, correctRegions:{}};
  show("quiz");
  if(typeof gtag==="function") gtag('event','quiz_start',{quiz:'dialect',lang});
  renderQuestion();
}
function renderQuestion(){
  const t=T[lang], data=POOL[lang], cur=game.items[game.i];
  $("q-count").textContent=t.count(game.i+1);
  $("q-score").textContent=t.score(game.score, game.streak);
  $("q-bar").style.width=(game.i/DRAW*100)+"%";
  const isQuote=!!cur.src;
  $("q-label").textContent=isQuote? t.labelQ : t.label;
  const w=$("q-word"); w.textContent=cur.q; w.classList.toggle("quote", isQuote);
  $("q-ask").textContent=t.ask;
  const others=shuffle(data.regions.filter(r=>r!==cur.r)).slice(0,3);
  const opts=shuffle([cur.r,...others]);
  const box=$("q-opts"); box.innerHTML="";
  opts.forEach(o=>{ const b=document.createElement("button"); b.className="opt"; b.textContent=o; b.onclick=()=>answer(b,o,cur); box.appendChild(b); });
  $("q-hintBtn").classList.remove("hide");
  $("q-hint").classList.add("hide");
  $("q-hint").textContent="💡 "+data.hint[cur.r];
  $("q-reveal").classList.add("hide");
  $("q-next").classList.add("hide");
}
function answer(btn, choice, cur){
  const t=T[lang], correct=choice===cur.r;
  if(correct){ game.score++; game.streak++; if(game.streak>game.maxStreak) game.maxStreak=game.streak; game.correctRegions[cur.r]=true; if(game.streak>=2) showCombo(game.streak); }
  else { game.streak=0; }
  [...$("q-opts").children].forEach(b=>{ b.disabled=true; if(b.textContent===cur.r) b.classList.add("correct"); else if(b===btn) b.classList.add("wrong"); else b.classList.add("dim"); });
  $("q-score").textContent=t.score(game.score, game.streak);
  $("q-hintBtn").classList.add("hide");
  $("q-hint").classList.add("hide");
  let html=`<span class="tag ${correct?'y':'n'}">${correct?t.correct:t.wrong}</span><br><b>${t.region}</b> · ${cur.r}<br><b>${t.mean}</b> · ${cur.m}`;
  if(cur.src) html+=`<br><span class="src">🎬 ${t.source} · ${cur.src}</span>`;
  $("q-reveal").innerHTML=html;
  $("q-reveal").classList.remove("hide");
  $("q-next").textContent=(game.i===DRAW-1)? t.finish : t.next;
  $("q-next").classList.remove("hide");
}
function next(){ if(game.i===DRAW-1){ finish(); return; } game.i++; renderQuestion(); }

function showCombo(n){
  const c=$("combo"); c.textContent=`🔥 ${n}${lang==="ko"?"연속!":" streak!"}`;
  c.classList.add("on"); clearTimeout(showCombo._t);
  showCombo._t=setTimeout(()=>c.classList.remove("on"),900);
}

/* ===== 결과 ===== */
function rankOf(s){ const r=T[lang].ranks.find(x=>s>=x[0]); return r?r[1]:""; }
function finish(){
  const t=T[lang], s=game.score, k=game.maxStreak;
  pushHOF(s,k);
  show("result");
  $("r-rank").textContent=rankOf(s);
  $("r-of").innerHTML=t.of(s);
  $("r-desc").textContent=t.rdesc(s);
  $("r-streak").innerHTML=t.streakRes(k);
  const regs=Object.keys(game.correctRegions);
  $("r-badges").innerHTML = regs.length? `<span style="width:100%;color:var(--sub);font-size:13px;font-weight:600;">${t.gotLbl}</span>`+regs.map(r=>`<span class="badge">${r}</span>`).join("") : "";
  renderHOF("r-hofWrap");
  setupResultLB();
  drawScoreCard(s,k);
  drawHofCard();
  if(s>=8) confetti();
  if(typeof gtag==="function") gtag('event','quiz_complete',{quiz:'dialect',lang,score:s,streak:k});
}

/* ===== 카드 PNG ===== */
function roundRect(x,X,Y,w,h,r){x.beginPath();x.moveTo(X+r,Y);x.arcTo(X+w,Y,X+w,Y+h,r);x.arcTo(X+w,Y+h,X,Y+h,r);x.arcTo(X,Y+h,X,Y,r);x.arcTo(X,Y,X+w,Y,r);x.closePath();}
function drawLogo(x,cx,topy){
  x.strokeStyle="#43474d"; x.lineWidth=22; x.beginPath(); x.arc(cx,topy,52,0,Math.PI*2); x.stroke();
  x.fillStyle="#43474d"; roundRect(x,cx-12,topy+50,24,66,12); x.fill();
}
function drawScoreCard(s,k){
  const c=$("r-canvas"), x=c.getContext("2d"), t=T[lang];
  x.fillStyle="#f5f5f7"; x.fillRect(0,0,800,1000);
  x.fillStyle="#ffffff"; roundRect(x,50,50,700,900,40); x.fill();
  drawLogo(x,400,180); x.textAlign="center";
  x.fillStyle="#43474d"; x.font="700 42px Pretendard,sans-serif"; x.fillText("OnlyOne",400,360);
  x.fillStyle="#6e6e73"; x.font="600 26px Pretendard,sans-serif"; x.fillText(t.title,400,420);
  x.fillStyle="#1d1d1f"; x.font="800 150px Pretendard,sans-serif"; x.fillText(s,400,610);
  x.fillStyle="#6e6e73"; x.font="600 38px Pretendard,sans-serif"; x.fillText("/ "+DRAW,400,668);
  x.fillStyle="#0071e3"; x.font="800 38px Pretendard,sans-serif"; x.fillText(rankOf(s),400,758);
  x.fillStyle="#e8590c"; x.font="700 30px Pretendard,sans-serif"; x.fillText("🔥 "+k,400,820);
  x.fillStyle="#a1a1a6"; x.font="500 22px Pretendard,sans-serif"; x.fillText("main.onlyonecorpceo.workers.dev",400,895);
}
function drawHofCard(){
  const c=$("r-hofcanvas"), x=c.getContext("2d"), t=T[lang], h=getHOF();
  x.fillStyle="#f5f5f7"; x.fillRect(0,0,800,1000);
  x.fillStyle="#ffffff"; roundRect(x,50,50,700,900,40); x.fill();
  drawLogo(x,400,160); x.textAlign="center";
  x.fillStyle="#43474d"; x.font="700 38px Pretendard,sans-serif"; x.fillText("OnlyOne",400,330);
  x.fillStyle="#1d1d1f"; x.font="800 40px Pretendard,sans-serif"; x.fillText("🏆 "+t.hofTitle,400,400);
  x.fillStyle="#6e6e73"; x.font="600 24px Pretendard,sans-serif"; x.fillText(t.title,400,445);
  const medals=["🥇","🥈","🥉","4","5"];
  let y=520;
  h.forEach((r,i)=>{
    x.fillStyle="#f0f0f3"; roundRect(x,110,y-42,580,66,18); x.fill();
    x.textAlign="left"; x.fillStyle="#1d1d1f"; x.font="700 30px Pretendard,sans-serif";
    x.fillText(`${medals[i]}  ${r.d}`,140,y);
    x.textAlign="right"; x.fillStyle="#0071e3"; x.font="800 30px Pretendard,sans-serif";
    x.fillText(`${r.s}/${DRAW}  🔥${r.k}`,660,y);
    y+=80;
  });
  x.textAlign="center"; x.fillStyle="#a1a1a6"; x.font="500 22px Pretendard,sans-serif";
  x.fillText("main.onlyonecorpceo.workers.dev",400,910);
}
function shareCanvas(canvas, fname){
  const t=T[lang];
  canvas.toBlob(async (blob)=>{
    if(!blob) return;
    const file=new File([blob], fname, {type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:t.title}); return; }catch(e){}
    }
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fname; a.click();
    setTimeout(()=>{ try{alert(t.saveAlert);}catch(e){} },200);
  });
}
async function shareLink(){
  const t=T[lang], text=t.sharetxt(game.score, game.maxStreak), url=location.href.split("?")[0];
  if(navigator.share){ try{ await navigator.share({title:t.title, text, url}); return; }catch(e){} }
  try{ await navigator.clipboard.writeText(text+" "+url); alert(t.copyAlert); }
  catch(e){ prompt("link:", text+" "+url); }
}

/* ===== 컨페티 ===== */
function confetti(){
  const e=["🎉","✨","🎊","⭐","🥳"];
  for(let i=0;i<26;i++){ const s=document.createElement("div"); s.className="confetti"; s.textContent=e[i%e.length];
    s.style.left=Math.random()*100+"vw"; s.style.animationDelay=(Math.random()*.6)+"s"; s.style.fontSize=(16+Math.random()*18)+"px";
    document.body.appendChild(s); setTimeout(()=>s.remove(),2700); }
}

/* ===== 언어 ===== */
function toggleLang(){
  lang=lang==="ko"?"en":"ko";
  localStorage.setItem("oo_dialect_lang",lang);
  renderStatic(); show("start"); game=null;
}

/* ===== 쿠키 동의 ===== */
function initConsent(){
  const saved=localStorage.getItem("oo_consent");
  if(saved==="granted"){ grantConsent(); return; }
  if(saved==="denied"){ return; }
  $("consent").classList.remove("hide");
}
function grantConsent(){
  if(typeof gtag==="function"){
    gtag('consent','update',{ad_storage:'granted', ad_user_data:'granted', ad_personalization:'granted', analytics_storage:'granted'});
  }
}

/* ===== 바인딩 ===== */
$("langBtn").onclick=toggleLang;
$("startBtn").onclick=startQuiz;
$("q-hintBtn").onclick=()=>$("q-hint").classList.toggle("hide");
$("q-speak").onclick=()=>{ if(game){ const c=game.items[game.i]; speak(c.q, c.r); } };
$("q-next").onclick=next;
$("r-cardScore").onclick=()=>shareCanvas($("r-canvas"),"onlyone-dialect-score.png");
$("r-cardHof").onclick=()=>shareCanvas($("r-hofcanvas"),"onlyone-dialect-hall.png");
$("r-share").onclick=shareLink;
$("r-submit").onclick=doSubmit;
$("r-retry").onclick=()=>{ show("start"); renderStatic(); };
$("c-accept").onclick=()=>{ localStorage.setItem("oo_consent","granted"); grantConsent(); $("consent").classList.add("hide"); };
$("c-deny").onclick=()=>{ localStorage.setItem("oo_consent","denied"); $("consent").classList.add("hide"); };

renderStatic();
show("start");
initConsent();
</script>
